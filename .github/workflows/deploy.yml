name: Deploy to Cloudflare

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hono-react-router

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm via Corepack
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to Cloudflare Workers
        uses: cloudflare/wrangler-action@2
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: hono-react-router
          command: publish
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Apply D1 migrations (optional)
        if: ${{ secrets.CF_RUN_MIGRATIONS == 'true' }}
        uses: cloudflare/wrangler-action@2
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: hono-react-router
          command: d1 migrations apply DB --remote
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
